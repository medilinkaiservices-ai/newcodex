<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com">
  <title>NewCodex AI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Tab & Layout Styles */
    .view-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .hidden { display: none !important; }
    #preview-frame { width: 100%; height: 100%; border: none; background: white; }
    #chat-container { height: 100%; display: flex; flex-direction: column; }
    #monaco-editor-container { width: 100%; flex: 1; overflow: hidden; }
  </style>
</head>
<body>
  <div id="app-container">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span>EXPLORER</span>
        <div style="display: flex; gap: 5px;">
          <button id="new-folder-btn" title="Create Folder">+</button>
          <button id="collapse-all-btn" title="Collapse All">-</button>
        </div>
      </div>
      <input type="text" id="file-search" placeholder="Search files..." />
      <div id="file-list"></div>
      
      <!-- 🔥 NPM SCRIPTS SECTION -->
      <div class="sidebar-header" style="border-top: 1px solid #333; margin-top: 10px;">SCRIPTS</div>
      <div id="scripts-list"></div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
      <!-- 🔥 NEW UNIFIED TOP BAR -->
      <div id="top-bar">
        <div class="nav-tabs">
          <button id="tab-chat" class="nav-btn active">Chat</button>
          <button id="tab-code" class="nav-btn">Code</button>
          <button id="tab-preview" class="nav-btn">Preview</button>
        </div>
        
        <div class="top-actions">
          <button id="open-folder-btn" class="icon-btn" title="Open Folder">📂</button>
          <button id="change-dir-btn" class="icon-btn" title="Switch Project">📁</button>
          <button id="deploy-btn" class="icon-btn" title="Deploy">🚀</button>
          <div class="divider"></div>
          <select id="model-select" class="minimal-select"><option value="llama3">Llama 3</option><option value="mistral">Mistral</option></select>
          <label class="agent-mode-label" title="Enable Autonomous Loop"><input type="checkbox" id="agent-mode-toggle"> Agent</label>
          <button id="regen-button" class="icon-btn" title="Regenerate">🔄</button>
          <button id="clear-chat-btn" class="icon-btn" title="Clear">🗑️</button>
          <button id="update-btn" class="icon-btn" title="Check Updates">⬆️</button>
        </div>
      </div>

      <!-- Preview View -->
      <div id="preview-view" class="view-container hidden">
        <iframe id="preview-frame"></iframe>
      </div>

      <!-- Chat View -->
      <div id="chat-view" class="view-container">
        <div id="chat-container">
          <div id="messages"></div>

          <!-- Update Notification -->
          <div id="update-notification" class="hidden">
            <p id="update-text"></p>
            <div id="progress-container">
              <div id="progress-bar"></div>
            </div>
          </div>

          <div id="input-area">
            <textarea id="user-input" placeholder="Type a message..."></textarea>
            <button id="stop-button" class="hidden" style="background-color: #ef4444;">Stop</button>
            <button id="send-button">Send</button>
          </div>
        </div>
      </div>

      <!-- Code Editor View -->
      <div id="code-view" class="view-container hidden">
        <div class="editor-toolbar">
          <span id="editor-filename">No file selected</span>
          <button id="format-btn">Format Code</button>
        </div>
        <div id="monaco-editor-container"></div>
        <div id="editor-status-bar">Ln 1, Col 1</div>
      </div>

      <!-- Integrated Terminal -->
      <div id="terminal-container">
        <div class="terminal-header">
          <span>TERMINAL</span>
          <div class="term-controls">
            <label class="watch-label"><input type="checkbox" id="watch-mode-toggle"> Watch</label>
            <input type="text" id="watch-command-input" value="npm test" placeholder="Command...">
            <button id="term-auto-fix" title="AI Fix">✨ Auto Fix</button> 
            <button id="clear-term">Clear</button>
          </div>
        </div>
        <div id="terminal-output"></div>
        <input type="text" id="terminal-input" placeholder="Execute command (e.g. npm install, node index.js)...">
      </div>
    </div>
  </div> <!-- End app-container -->
  
  <!-- 🔥 MONACO EDITOR LOADER (Safe for Electron) -->
  <script>
    var nodeRequire = global.require;
    var nodeModule = global.module;
    var nodeProcess = global.process;
    global.require = undefined;
    global.module = undefined;
    global.process = undefined;
  </script>
  <!-- Prettier for Code Formatting -->
  <script src="https://unpkg.com/prettier@2.8.8/standalone.js"></script>
  <script src="https://unpkg.com/prettier@2.8.8/parser-babel.js"></script>
  <script src="https://unpkg.com/prettier@2.8.8/parser-html.js"></script>
  <script src="https://unpkg.com/prettier@2.8.8/parser-postcss.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    // Define Monaco require & Restore Node require
    var monacoRequire = global.require;
    global.require = nodeRequire;
    global.module = nodeModule;
    global.process = nodeProcess;

    monacoRequire.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
  </script>

  <script src="renderer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewCodex</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app-container">
    <aside id="sidebar">
      <div class="brand-panel">
        <div class="brand-badge">NC</div>
        <div class="brand-title">NewCodex</div>
        <button id="open-project-btn" class="sidebar-open-btn" aria-label="Open project">Open</button>
        <button id="clone-repo-btn" class="sidebar-open-btn" aria-label="Clone repository">Clone</button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-header">
          <span>Files</span>
          <div class="sidebar-mini-actions">
            <button id="new-file-btn" class="mini-action-btn" aria-label="New file">+F</button>
            <button id="new-folder-btn" class="mini-action-btn" aria-label="New folder">+D</button>
          </div>
        </div>
        <input id="file-search" type="text" placeholder="Filter">
        <div id="file-list"></div>
      </div>

      <div class="sidebar-section queue-section">
        <div class="sidebar-header">
          <span>Queue</span>
          <button id="run-queue-btn" class="mini-action-btn" aria-label="Run queue">Run</button>
        </div>
        <div id="task-queue-list" class="task-queue-list"></div>
      </div>
    </aside>

    <main id="main-content">
      <header id="top-bar">
        <div class="session-title">
          <span class="session-label">Session</span>
          <span class="session-name">Chat</span>
          <span id="provider-pill" class="provider-pill">Auto</span>
        </div>

        <div class="top-actions">
          <select id="model-select" aria-label="Model">
            <option value="llama3">Llama 3</option>
            <option value="codellama">Code Llama</option>
            <option value="mistral">Mistral</option>
          </select>
          <label class="agent-mode-label" for="agent-mode-toggle">
            <input id="agent-mode-toggle" type="checkbox">
            <span>Agent</span>
          </label>
        </div>
      </header>

      <section id="chat-view" class="panel-view">
        <div id="chat-container">
          <div id="messages"></div>
          <div id="tool-rail" class="tool-rail"></div>

          <div id="update-notification" class="hidden">
            <div id="update-text">Checking for updates...</div>
            <div id="progress-container">
              <div id="progress-bar"></div>
            </div>
          </div>

          <div id="input-area">
            <div id="composer-shell">
              <div id="attachment-tray" class="hidden"></div>
              <textarea id="user-input" placeholder="Describe what you want to build, fix, or automate..."></textarea>
            </div>
            <div class="composer-actions">
              <button id="stop-button" class="hidden danger-btn" aria-label="Stop generation">&#9632;</button>
              <button id="send-button" aria-label="Send message">&#8593;</button>
            </div>
          </div>
        </div>
      </section>

      <section id="code-view" class="panel-view hidden">
        <div class="editor-toolbar">
          <div id="editor-filename">No file selected</div>
          <button id="format-btn" class="secondary-btn">Format</button>
        </div>
        <div id="monaco-editor-container" class="editor-surface">
          <div class="empty-state">
            <h2>Open a file from the sidebar</h2>
            <p>Generated files and project edits will appear here.</p>
          </div>
        </div>
        <div id="editor-status-bar">Ln 1, Col 1</div>
      </section>

      <section id="preview-view" class="panel-view hidden">
        <iframe id="preview-frame" title="Project preview"></iframe>
      </section>

      <section id="terminal-container" class="hidden">
        <div class="terminal-header">
          <span>Integrated Terminal</span>
          <div class="term-controls">
            <label class="watch-label" for="watch-mode-toggle">
              <input id="watch-mode-toggle" type="checkbox">
              <span>Watch</span>
            </label>
            <input id="watch-command-input" type="text" placeholder="npm run build">
            <button id="term-auto-fix" class="secondary-btn">Auto Fix</button>
            <button id="clear-term" class="secondary-btn">Clear</button>
          </div>
        </div>
        <pre id="terminal-output"></pre>
        <input id="terminal-input" type="text" placeholder="Run a command inside the current project">
      </section>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
